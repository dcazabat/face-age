<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Face Age - Flask</title>
  <link rel="stylesheet" href="static/css/style.css">
</head>
<body
  class="min-h-screen bg-slate-950 text-slate-100"
  data-face-age-analyze-url="{{ analyze_url }}"
  data-face-age-client-log-url="{{ client_log_url }}"
  data-face-age-refresh-storage-key="face-age-refresh-interval-seconds"
>
  <div class="background-glow"></div>

  <main class="relative mx-auto flex min-h-screen w-full max-w-6xl items-center px-4 py-10 sm:px-6">
    <section class="w-full rounded-2xl border border-slate-800/80 bg-slate-900/70 p-5 shadow-2xl shadow-blue-950/40 backdrop-blur md:p-8">
      <div class="mb-6">
        <p class="mb-2 inline-flex rounded-full border border-cyan-400/30 bg-cyan-500/10 px-3 py-1 text-xs font-semibold uppercase tracking-wider text-cyan-300">AI Vision Dashboard</p>
        <h1 class="text-2xl font-bold tracking-tight text-white md:text-3xl">Reconocimiento facial en tiempo real</h1>
        <p class="mt-2 text-sm text-slate-300 md:text-base">La cámara se toma desde el navegador del visitante</p>
      </div>

      <div class="toolbar">
        <div class="toolbar-actions">
          <button id="camera-toggle-btn" type="button" class="camera-toggle-btn rounded-lg border border-emerald-400/40 bg-emerald-500/15 px-4 py-2 text-sm font-semibold text-emerald-300 transition hover:bg-emerald-500/25">Encender cámara</button>
          <button id="capture-btn" type="button" class="rounded-lg border border-blue-400/40 bg-blue-500/15 px-4 py-2 text-sm font-semibold text-blue-300 transition hover:bg-blue-500/25">Capturar</button>
        </div>

        <div class="controls-row">
          <div>
            <label for="refresh-interval">Tiempo de refresco</label>
            <input id="refresh-interval" type="range" min="1" max="10" step="1" value="3">
          </div>
          <div id="refresh-interval-value" class="interval-value">3 s</div>
        </div>
      </div>

      <div id="status" class="status status-ok"></div>

      <div class="camera-frame">
        <video id="video" autoplay muted playsinline class="block h-full w-full object-cover"></video>
        <canvas id="overlay" class="pointer-events-none absolute inset-0 block h-full w-full"></canvas>
      </div>
    </section>
  </main>

  <script src="static/js/app.js" defer></script>
</body>
</html>
